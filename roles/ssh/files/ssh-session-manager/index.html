<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH Session Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Roboto', 'sans-serif'],
            mono: ['IBM Plex Mono', 'monospace'],
          },
          colors: {
            ink: {
              50: '#eef0f6', 100: '#dde1ef', 200: '#bcc3d9', 300: '#909ab9',
              400: '#7580a8', 500: '#5c6890', 600: '#48526f', 700: '#363d58',
              800: '#1e2336', 900: '#111524', 950: '#080a11',
            },
            neon: { DEFAULT: '#00e5a0', dim: '#00c98c', bright: '#33ffbe' },
            electric: '#7c6cff',
          },
        },
      },
    }
  </script>
  <style>
    body {
      background:
        radial-gradient(ellipse 80% 50% at 5% -10%, rgba(0,229,160,0.11) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 95% 110%, rgba(124,108,255,0.09) 0%, transparent 50%),
        #080a11;
    }
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .host-row {
      transition: all 0.15s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .host-row:hover {
      transform: translateX(4px);
      border-left-color: #00e5a0;
      box-shadow: 0 0 30px rgba(0,229,160,0.08);
    }
    .search-input:focus {
      box-shadow: 0 0 0 1px rgba(0,229,160,0.35), 0 0 20px rgba(0,229,160,0.07);
    }
    mark {
      background: rgba(0,229,160,0.14);
      color: #33ffbe;
      border-radius: 2px;
      padding: 0 1px;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    .animate-in { animation: fadeUp 0.35s ease-out both; }
    .dot-pulse { animation: pulseDot 2.8s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin svg { animation: spin 0.5s linear infinite; }
    .folder-content {
      display: grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 0.22s ease, opacity 0.22s ease;
      opacity: 1;
    }
    .folder-content.collapsed { grid-template-rows: 0fr; opacity: 0; }
    .folder-content > div { overflow: hidden; padding-top: 4px; }
    .folder-chevron { transition: transform 0.22s ease; }
    .folder[data-open="true"] .folder-chevron { transform: rotate(90deg); }
    .folder[data-open="true"] .folder-icon { color: rgba(0,229,160,0.8); }
    .folder[data-open="true"] .folder-label { color: #bcc3d9; }
    .folder[data-open="false"] .folder-icon { color: #5c6890; }
    .folder[data-open="false"] .folder-label { color: #7580a8; }
    /* Light theme */
    .light body {
      background:
        radial-gradient(ellipse 80% 50% at 5% -10%, rgba(0,200,140,0.07) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 95% 110%, rgba(124,108,255,0.05) 0%, transparent 50%),
        #eef0f8;
    }
    .light .text-white { color: #0d1019 !important; }
    .light .text-ink-100 { color: #191d2d !important; }
    .light .text-ink-200 { color: #282d44 !important; }
    .light .text-ink-400 { color: #5e678f !important; }
    .light .text-ink-500 { color: #7e87ab !important; }
    .light .text-ink-600 { color: #a9afc7 !important; }
    .light .bg-ink-900\/40 { background: rgba(255,255,255,0.65) !important; }
    .light .bg-ink-900\/70 { background: rgba(255,255,255,0.88) !important; }
    .light .bg-ink-800\/50 { background: rgba(215,219,238,0.8) !important; }
    .light .bg-ink-800\/60 { background: rgba(215,219,238,0.9) !important; }
    .light .bg-ink-800\/80 { background: rgba(205,210,232,0.9) !important; }
    .light .bg-ink-800\/40 { background: rgba(215,219,238,0.5) !important; }
    .light .border-ink-700\/30 { border-color: rgba(126,135,171,0.25) !important; }
    .light .border-ink-700\/40 { border-color: rgba(126,135,171,0.35) !important; }
    .light .border-ink-700\/50 { border-color: rgba(126,135,171,0.45) !important; }
    .light .border-ink-700\/60 { border-color: rgba(126,135,171,0.55) !important; }
    .light .via-ink-700\/50 { --tw-gradient-via: rgba(126,135,171,0.3); }
    .light .host-row:hover { border-left-color: #00c98c; box-shadow: 0 0 20px rgba(0,200,140,0.06) !important; }
    .light .search-input:focus { box-shadow: 0 0 0 1px rgba(0,200,140,0.3), 0 0 16px rgba(0,200,140,0.05) !important; }
    .light mark { background: rgba(0,200,140,0.15) !important; color: #00875a !important; }
    .light input::placeholder { color: #9aa3bf !important; }
    .light .folder[data-open="true"] .folder-label { color: #191d2d !important; }
    .light .folder[data-open="false"] .folder-label { color: #5e678f !important; }
    .light .folder[data-open="false"] .folder-icon { color: #9aa3bf !important; }
    .light .grain { opacity: 0.01; }
  </style>
  <script>if(localStorage.getItem('ssh-hosts-theme')==='light')document.documentElement.classList.add('light');</script>
</head>
<body class="min-h-screen text-ink-200 antialiased font-display">
  <div class="grain"></div>

  <div class="relative z-10 px-8 py-12">

    <!-- Header -->
    <header class="mb-10 animate-in">
      <div class="flex items-center justify-between gap-3.5 mb-3">
        <div class="flex items-center gap-3.5">
          <div class="w-10 h-10 rounded-xl bg-neon/[0.08] border border-neon/[0.15] flex items-center justify-center">
            <svg class="w-5 h-5 text-neon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
            </svg>
          </div>
          <div>
            <h1 class="font-display text-[1.65rem] font-semibold tracking-tight text-white leading-none">SSH Session Manager</h1>
            <div class="flex items-center gap-1.5 mt-1.5 text-[11px] text-ink-500">
              <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
              <span id="configDir" class="text-ink-400 font-mono">…</span>
            </div>
          </div>
        </div>
        <button
          id="themeBtn"
          onclick="toggleTheme()"
          class="group flex items-center gap-1.5 px-2.5 py-1 text-[11px] text-ink-500 border border-ink-700/40 rounded-lg hover:border-neon/25 hover:text-neon/80 transition-all duration-200"
          title="Toggle theme"
        >
          <svg id="iconMoon" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
          </svg>
          <svg id="iconSun" class="w-3.5 h-3.5 hidden" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="relative mb-5 animate-in" style="animation-delay:60ms">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <svg class="w-[18px] h-[18px] text-ink-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
        </svg>
      </div>
      <input
        id="search"
        type="text"
        placeholder="Search hosts, IPs, users..."
        class="search-input w-full bg-ink-900/70 backdrop-blur border border-ink-700/50 rounded-xl py-3 pl-11 pr-16 text-sm text-ink-100 placeholder:text-ink-600 outline-none focus:border-neon/25 transition-all duration-200"
        autofocus
      >
      <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
        <kbd class="hidden sm:inline-flex items-center px-1.5 py-0.5 text-[10px] text-ink-600 bg-ink-800/80 border border-ink-700/60 rounded font-mono">/</kbd>
      </div>
    </div>

    <!-- Stats -->
    <div class="flex items-center justify-between mb-4 animate-in" style="animation-delay:100ms">
      <span id="statsText" class="text-[11px] text-ink-500"></span>
      <div class="flex items-center gap-2">
        <div id="folderActions" class="hidden flex items-center gap-2">
          <button
            onclick="expandAll()"
            class="group flex items-center gap-1.5 px-2.5 py-1 text-[11px] text-ink-500 border border-ink-700/40 rounded-lg hover:border-neon/25 hover:text-neon/80 transition-all duration-200"
            title="Expand all folders"
          >
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
            </svg>
            Expand
          </button>
          <button
            onclick="collapseAll()"
            class="group flex items-center gap-1.5 px-2.5 py-1 text-[11px] text-ink-500 border border-ink-700/40 rounded-lg hover:border-neon/25 hover:text-neon/80 transition-all duration-200"
            title="Collapse all folders"
          >
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25"/>
            </svg>
            Collapse
          </button>
        </div>
        <button
          id="reloadBtn"
          onclick="reload()"
          class="group flex items-center gap-1.5 px-2.5 py-1 text-[11px] text-ink-500 border border-ink-700/40 rounded-lg hover:border-neon/25 hover:text-neon/80 transition-all duration-200"
        >
          <svg class="w-3 h-3 transition-transform group-hover:rotate-45 duration-200" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
          Reload
        </button>
      </div>
    </div>

    <!-- Divider -->
    <div class="h-px bg-gradient-to-r from-transparent via-ink-700/50 to-transparent mb-4 animate-in" style="animation-delay:120ms"></div>

    <!-- Host list -->
    <div id="hostList" class="space-y-1"></div>

  </div>

  <script>
    let allGroups = [];
    let openFolders = new Set();

    function initTheme() {
      if (document.documentElement.classList.contains('light')) {
        document.getElementById('iconMoon').classList.add('hidden');
        document.getElementById('iconSun').classList.remove('hidden');
      }
    }

    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('light');
      localStorage.setItem('ssh-hosts-theme', isLight ? 'light' : 'dark');
      document.getElementById('iconMoon').classList.toggle('hidden', isLight);
      document.getElementById('iconSun').classList.toggle('hidden', !isLight);
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function envBadgeClass(env) {
      const v = env.toUpperCase();
      if (/^(DEV|SIT)/.test(v)) return 'text-green-400 bg-green-400/10 border-green-400/20';
      if (/^(PAT|DRT)/.test(v))        return 'text-yellow-400 bg-yellow-400/10 border-yellow-400/20';
      if (/^(PROD|DRP)/.test(v)) return 'text-red-400 bg-red-400/10 border-red-400/20';
      return 'text-ink-500 bg-ink-800/60 border-ink-700/40';
    }

    function copyHostname(hostname, btn) {
      navigator.clipboard.writeText(hostname).then(() => {
        const icon  = btn.querySelector('.copy-icon');
        const check = btn.querySelector('.check-icon');
        icon.classList.add('hidden');
        check.classList.remove('hidden');
        setTimeout(() => { icon.classList.remove('hidden'); check.classList.add('hidden'); }, 1500);
      });
    }

    function highlight(text, q) {
      if (!q) return esc(text);
      const e = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return esc(text).replace(new RegExp(`(${e})`, 'gi'), '<mark>$1</mark>');
    }

    function expandAll() {
      allGroups.forEach(g => openFolders.add(g.file));
      document.querySelectorAll('.folder').forEach(folder => {
        folder.dataset.open = 'true';
        folder.querySelector('.folder-content')?.classList.remove('collapsed');
      });
    }

    function collapseAll() {
      openFolders.clear();
      document.querySelectorAll('.folder').forEach(folder => {
        folder.dataset.open = 'false';
        folder.querySelector('.folder-content')?.classList.add('collapsed');
      });
    }

    function toggleFolder(file) {
      const nowOpen = !openFolders.has(file);
      if (nowOpen) openFolders.add(file); else openFolders.delete(file);
      const folder = document.querySelector(`.folder[data-file="${CSS.escape(file)}"]`);
      if (!folder) return;
      folder.dataset.open = nowOpen;
      folder.querySelector('.folder-content').classList.toggle('collapsed', !nowOpen);
    }

    function hostRowHTML(h, query, idx) {
      const target = h.hostname || h.name;
      const sshUrl = `ssh://${h.user ? h.user + '@' : ''}${target}${h.port && h.port !== '22' ? ':' + h.port : ''}`;
      const sftpUrl = `sftp://${h.user ? h.user + '@' : ''}${target}${h.port && h.port !== '22' ? ':' + h.port : ''}`;
      const delay = Math.min(idx * 15, 200);
      return `
        <div data-ssh="${esc(sshUrl)}"
           class="host-row group block rounded-xl bg-ink-900/40 border border-ink-700/30 border-l-2 border-l-transparent hover:bg-ink-800/50 hover:border-ink-700/50 px-4 py-3 cursor-pointer animate-in"
           style="animation-delay:${delay}ms"
           onclick="window.location.href=this.dataset.ssh"
           title="ssh ${h.user ? h.user + '@' : ''}${target}">
          <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
              <span class="flex-shrink-0 w-2 h-2 rounded-full bg-neon dot-pulse"></span>
              <span class="text-[13px] font-medium text-ink-100 truncate group-hover:text-neon transition-colors duration-150">
                ${highlight(h.name, query)}
              </span>
              <div class="flex-shrink-0 flex items-center gap-0.5" onclick="event.stopPropagation()">
                <button
                   onclick="copyHostname('${esc(target)}', this)"
                   class="p-1 rounded text-ink-600 hover:text-sky-400 hover:bg-sky-400/10 transition-all duration-150"
                   title="Copy hostname">
                  <svg class="copy-icon w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184"/>
                  </svg>
                  <svg class="check-icon w-4 h-4 hidden text-green-400" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                  </svg>
                </button>
                <a href="${esc(sshUrl)}"
                   class="p-1 rounded text-ink-600 hover:text-neon hover:bg-neon/10 transition-all duration-150"
                   title="Connect via SSH">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
                  </svg>
                </a>
                <a href="${esc(sftpUrl)}"
                   class="p-1 rounded text-ink-600 hover:text-electric hover:bg-electric/10 transition-all duration-150"
                   title="Connect via SFTP">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/>
                  </svg>
                </a>
                ${h.url ? `
                <a href="${esc(h.url)}"
                   target="_blank"
                   rel="noopener noreferrer"
                   class="p-1 rounded text-ink-600 hover:text-amber-400 hover:bg-amber-400/10 transition-all duration-150"
                   title="Open URL: ${esc(h.url)}">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253M3 12c0 .778.099 1.533.284 2.253"/>
                  </svg>
                </a>` : ''}
              </div>
              ${h.description ? `<span class="flex-shrink-0 text-[10px] text-electric bg-electric/10 border border-electric/20 rounded px-1.5 py-0.5 font-mono">${highlight(h.description, query)}</span>` : ''}
              ${h.env ? `<span class="flex-shrink-0 text-[10px] border rounded px-1.5 py-0.5 font-mono font-semibold tracking-wide ${envBadgeClass(h.env)}">${highlight(h.env, query)}</span>` : ''}
            </div>
            <div class="flex items-center gap-3.5 flex-shrink-0 text-[11px] text-ink-500">
              ${h.user ? `
              <span class="hidden sm:flex items-center gap-1">
                <svg class="w-3 h-3 text-ink-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/></svg>
                <span>${highlight(h.user, query)}</span>
              </span>` : ''}
              <span class="flex items-center gap-1">
                <svg class="w-3 h-3 text-ink-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 003-3m-3 3v3.75m13.5-3.75a3 3 0 01-3-3m3 3a3 3 0 003-3m-3 3v3.75M3.75 21h16.5M5.25 6.75h13.5"/></svg>
                <span class="text-ink-400 font-mono">${highlight(target, query)}</span>
              </span>
              ${h.port !== '22' ? `<span class="text-electric font-medium">:${esc(h.port)}</span>` : ''}
            </div>
          </div>
        </div>`;
    }

    function renderHosts(query = '') {
      const list = document.getElementById('hostList');
      const q = query.toLowerCase().trim();

      const totalHosts = allGroups.reduce((sum, g) => sum + g.hosts.length, 0);

      const filteredGroups = allGroups.map(g => ({
        file: g.file,
        hosts: q ? g.hosts.filter(h =>
          h.name.toLowerCase().includes(q) ||
          h.hostname.toLowerCase().includes(q) ||
          h.user.toLowerCase().includes(q) ||
          h.description.toLowerCase().includes(q) ||
          h.env.toLowerCase().includes(q) ||
          (h.url || '').toLowerCase().includes(q)
        ) : g.hosts
      })).filter(g => g.hosts.length > 0);

      const filteredCount = filteredGroups.reduce((sum, g) => sum + g.hosts.length, 0);

      document.getElementById('statsText').textContent = q
        ? `${filteredCount} of ${totalHosts} hosts`
        : `${totalHosts} hosts · ${allGroups.length} ${allGroups.length === 1 ? 'file' : 'files'}`;
      document.getElementById('folderActions').classList.toggle('hidden', allGroups.length <= 1);

      if (totalHosts === 0) {
        list.innerHTML = `
          <div class="text-center py-20">
            <div class="inline-flex w-12 h-12 rounded-xl bg-ink-800/60 border border-ink-700/40 items-center justify-center mb-4">
              <svg class="w-6 h-6 text-ink-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
            </div>
            <p class="text-sm text-ink-400 font-display font-medium">No hosts found</p>
            <p class="text-[11px] text-ink-600 mt-1">Verify your <span class="text-ink-400">SSH_CONFIG_DIR</span> path</p>
          </div>`;
        return;
      }

      if (filteredGroups.length === 0) {
        list.innerHTML = `
          <div class="text-center py-16">
            <div class="text-ink-600 text-2xl mb-3">⌘</div>
            <p class="text-sm text-ink-500">No matches for "<span class="text-ink-300">${esc(query)}</span>"</p>
          </div>`;
        return;
      }

      // When searching, auto-expand folders that have matches
      if (q) filteredGroups.forEach(g => openFolders.add(g.file));

      // Single file: skip folder headers, render flat
      if (allGroups.length === 1) {
        list.innerHTML = filteredGroups[0].hosts.map((h, i) => hostRowHTML(h, query, i)).join('');
        return;
      }

      list.innerHTML = filteredGroups.map((g, gi) => {
        const isOpen = q ? true : openFolders.has(g.file);
        const gDelay = gi * 40;
        return `
          <div class="folder mb-2 animate-in" data-file="${esc(g.file)}" data-open="${isOpen}" style="animation-delay:${gDelay}ms">
            <button
              data-folder="${esc(g.file)}"
              class="folder-btn w-full flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-ink-800/40 transition-colors duration-150"
            >
              <svg class="folder-chevron w-3 h-3 text-ink-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
              </svg>
              <svg class="folder-icon w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0021 18V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v12a2.25 2.25 0 002.25 2.25z"/>
              </svg>
              <span class="folder-label text-[12px] font-mono font-medium flex-1 text-left truncate">${esc(g.file)}</span>
              <span class="text-[10px] text-ink-600 font-mono tabular-nums">${g.hosts.length}</span>
            </button>
            <div class="folder-content${isOpen ? '' : ' collapsed'}">
              <div class="pl-5 space-y-1">${g.hosts.map((h, i) => hostRowHTML(h, query, i)).join('')}</div>
            </div>
          </div>`;
      }).join('');
    }

    async function reload() {
      const btn = document.getElementById('reloadBtn');
      btn.classList.add('spin');
      try {
        const res = await fetch('/api/hosts');
        allGroups = await res.json();
        openFolders = new Set();
        renderHosts(document.getElementById('search').value);
      } catch (e) { console.error('Reload failed:', e); }
      finally { setTimeout(() => btn.classList.remove('spin'), 400); }
    }

    document.getElementById('search').addEventListener('input', e => renderHosts(e.target.value));

    document.getElementById('hostList').addEventListener('click', e => {
      const btn = e.target.closest('.folder-btn');
      if (btn) toggleFolder(btn.dataset.folder);
    });

    document.addEventListener('keydown', e => {
      const s = document.getElementById('search');
      if (e.key === '/' && document.activeElement !== s) { e.preventDefault(); s.focus(); }
      if (e.key === 'Escape') { s.value = ''; renderHosts(); s.blur(); }
    });

    async function init() {
      try {
        const [hostsRes, configRes] = await Promise.all([
          fetch('/api/hosts'),
          fetch('/api/config'),
        ]);
        allGroups = await hostsRes.json();
        openFolders = new Set();
        const { config_dir } = await configRes.json();
        document.getElementById('configDir').textContent = config_dir;
      } catch (e) {
        console.error('Init failed:', e);
      }
      renderHosts();
    }

    initTheme();
    init();
  </script>
</body>
</html>
